<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real-Time Voice & Emotion Processing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050508;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;padding:2rem}
.container{max-width:700px;margin:0 auto}
.badge{display:inline-block;background:#00d4ff15;border:1px solid #00d4ff33;color:#00d4ff;border-radius:999px;padding:.25rem .75rem;font-size:.75rem;margin-bottom:1rem}
h1{font-size:1.75rem;font-weight:800;margin-bottom:.4rem;background:linear-gradient(135deg,#00d4ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#64748b;font-size:.875rem;margin-bottom:1.5rem}
.mic-card{background:#13131f;border:1px solid #1e1e35;border-radius:16px;padding:1.5rem;margin-bottom:1rem;text-align:center}
.mic-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;margin-bottom:1rem}
.mic-icon{width:80px;height:80px;background:#00d4ff15;border:2px solid #00d4ff33;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative;z-index:1}
.pulse{position:absolute;width:80px;height:80px;border-radius:50%;background:#00d4ff;opacity:0;animation:pulse 1.5s ease-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.4}100%{transform:scale(1.8);opacity:0}}
.wave-container{display:flex;align-items:center;gap:3px;height:50px;justify-content:center;margin:1rem 0}
.wave-bar{width:4px;border-radius:2px;animation:wave .8s ease-in-out infinite}
.wave-bar.active{background:#00d4ff}
.wave-bar.inactive{background:#1e1e35}
@keyframes wave{0%,100%{height:4px}50%{height:var(--h,20px)}}
.controls{display:flex;gap:.75rem;justify-content:center;margin-top:1rem}
button{padding:.7rem 1.5rem;background:#00d4ff;color:#050508;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-size:.9rem}
button.stop{background:#0e0e16;border:1px solid #1e1e35;color:#94a3b8}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:.5rem;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.live-label{font-size:.8rem;color:#ef4444;font-weight:700}
.emotion-card{background:#13131f;border:1px solid #1e1e35;border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.big-emotion{text-align:center;margin-bottom:1.5rem}
.em-emoji{font-size:3.5rem}
.em-name{font-size:1.5rem;font-weight:800;color:#00d4ff;margin:.5rem 0}
.em-conf{font-size:.85rem;color:#64748b}
.em-bar{margin-bottom:.75rem}
.em-label{display:flex;justify-content:space-between;font-size:.75rem;color:#94a3b8;margin-bottom:.3rem}
.bar-bg{background:#0e0e16;border-radius:999px;height:6px}
.bar-fill{height:6px;border-radius:999px;background:linear-gradient(90deg,#00d4ff,#7c3aed);transition:width .5s ease}
.transcript-card{background:#13131f;border:1px solid #1e1e35;border-radius:16px;padding:1.5rem}
.transcript-label{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.transcript-text{font-size:1rem;line-height:1.6;min-height:2.5rem;color:#e2e8f0;border-left:3px solid #00d4ff;padding-left:.75rem}
</style>
</head>
<body>
<div class="container">
  <span class="badge">🎙️ NLP + Audio AI</span>
  <h1>Real-Time Voice & Emotion</h1>
  <p class="sub">Live speech transcription with multi-label emotion detection using Whisper + transformer classifier.</p>

  <div class="mic-card">
    <div id="rec-status" style="display:none;margin-bottom:.75rem"><span class="status-dot"></span><span class="live-label">RECORDING</span></div>
    <div class="mic-wrap"><div class="pulse" id="pulse" style="animation:none"></div><div class="mic-icon">🎙️</div></div>
    <div class="wave-container" id="waves"></div>
    <div class="controls">
      <button onclick="startDemo()">▶ Start Demo</button>
      <button class="stop" onclick="stopDemo()">⏹ Stop</button>
    </div>
  </div>

  <div class="emotion-card">
    <div class="big-emotion">
      <div class="em-emoji" id="em-emoji">😐</div>
      <div class="em-name" id="em-name">Neutral</div>
      <div class="em-conf" id="em-conf">Confidence: –</div>
    </div>
    <div id="em-bars"></div>
  </div>

  <div class="transcript-card">
    <div class="transcript-label">📝 Live Transcript</div>
    <div class="transcript-text" id="transcript">Waiting for audio input...</div>
  </div>
</div>

<script>
// Setup wave bars
const wc=document.getElementById('waves');
for(let i=0;i<30;i++){
  const b=document.createElement('div');
  b.className='wave-bar inactive';
  const h=4+Math.random()*30;
  b.style.setProperty('--h',h+'px');
  b.style.animationDelay=(i*0.05)+'s';
  b.style.height='4px';
  wc.appendChild(b);
}

const emojis={'Happy':'😄','Sad':'😢','Excited':'🤩','Neutral':'😐','Tired':'😴','Surprised':'😲','Focused':'🧐','Calm':'😌','Angry':'😠'};
let step=0, timer=null, active=false;

function startDemo(){
  if(active)return;
  active=true;
  document.getElementById('rec-status').style.display='block';
  document.getElementById('pulse').style.animation='pulse 1.5s ease-out infinite';
  document.querySelectorAll('.wave-bar').forEach((b,i)=>{b.className='wave-bar active';b.style.animationDelay=(i*0.05)+'s';});
  timer=setInterval(nextStep,2500);
  nextStep();
}

function stopDemo(){
  active=false;
  clearInterval(timer);
  document.getElementById('rec-status').style.display='none';
  document.getElementById('pulse').style.animation='none';
  document.querySelectorAll('.wave-bar').forEach(b=>{b.className='wave-bar inactive';b.style.height='4px';});
}

async function nextStep(){
  const r=await fetch('/demo/'+step);
  const j=await r.json();
  step++;
  document.getElementById('em-emoji').textContent=emojis[j.emotion]||'😐';
  document.getElementById('em-name').textContent=j.emotion;
  document.getElementById('em-conf').textContent='Confidence: '+(j.confidence*100).toFixed(1)+'%';
  document.getElementById('transcript').textContent=j.text;
  const bars=document.getElementById('em-bars');
  bars.innerHTML=Object.entries(j.emotions).map(([k,v])=>`<div class="em-bar"><div class="em-label"><span>${k}</span><span>${v}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${v}%"></div></div></div>`).join('');
}
</script>
</body>
</html>
